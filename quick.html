<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Admin · Dame Una Doble</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root { --amber:#F5A800; --amber-dark:#BA7517; --espresso:#1A0F00; --foam:#FFF8ED; --slate:#3D3530; --slate-light:#6B5E57; --green:#2D8A4E; --red:#D94F3D; --border:rgba(61,53,48,0.12); --border-strong:rgba(61,53,48,0.25); }
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:'Inter',sans-serif; background:var(--foam); color:var(--espresso); }
.login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0D0900; padding:1.5rem; }
.login-card { background:var(--foam); border-radius:18px; padding:2rem; width:100%; max-width:340px; text-align:center; }
.login-logo { font-family:'Bebas Neue',sans-serif; font-size:30px; }
.login-logo span { color:var(--amber-dark); }
.login-sub { font-size:13px; color:var(--slate-light); margin-bottom:1.5rem; }
.login-card input { width:100%; padding:14px; border:1px solid var(--border-strong); border-radius:12px; font-size:16px; font-family:'Inter',sans-serif; background:#fff; margin-bottom:12px; outline:none; }
.login-card input:focus { border-color:var(--amber-dark); }
.btn-primary { width:100%; padding:14px; background:var(--amber-dark); color:var(--foam); border:none; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
.login-error { color:var(--red); font-size:13px; margin-top:8px; display:none; }
.app { display:none; min-height:100vh; padding-bottom:2rem; }
.app-header { background:#0D0900; color:var(--foam); padding:1rem 1.25rem; position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; }
.app-logo { font-family:'Bebas Neue',sans-serif; font-size:20px; }
.app-logo span { color:var(--amber); }
.app-header a { color:rgba(255,248,237,0.6); font-size:12px; text-decoration:none; }
.stats-bar { display:flex; gap:8px; padding:1rem 1.25rem; }
.stat-chip { flex:1; background:#fff; border:1px solid var(--border); border-radius:12px; padding:0.6rem; text-align:center; }
.stat-chip-num { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--amber-dark); line-height:1; }
.stat-chip-label { font-size:10px; color:var(--slate-light); margin-top:2px; }

/* TABS */
.tabs { display:flex; padding:0 1.25rem; gap:4px; border-bottom:2px solid var(--border); margin-bottom:0; }
.tab { flex:1; padding:10px 4px; text-align:center; font-size:12px; font-weight:600; border:none; background:transparent; color:var(--slate-light); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; font-family:'Inter',sans-serif; }
.tab.active { color:var(--amber-dark); border-bottom-color:var(--amber-dark); }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* SORT BAR */
.sort-bar { display:flex; gap:6px; padding:12px 1.25rem; overflow-x:auto; }
.sort-pill { padding:6px 12px; border-radius:20px; border:1px solid var(--border-strong); background:#fff; font-size:12px; white-space:nowrap; cursor:pointer; color:var(--slate); font-family:'Inter',sans-serif; }
.sort-pill.active { background:var(--amber-dark); color:var(--foam); border-color:var(--amber-dark); }

/* SEARCH */
.search-section { padding:12px 1.25rem; position:sticky; top:56px; background:var(--foam); z-index:90; border-bottom:1px solid var(--border); }
.search-box { width:100%; padding:12px 16px; border:2px solid var(--border-strong); border-radius:12px; font-size:16px; font-family:'Inter',sans-serif; background:#fff; outline:none; }
.search-box:focus { border-color:var(--amber); }

/* CARDS */
.card-list { padding:1rem 1.25rem; }
.q-card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:1rem; margin-bottom:12px; transition:border-color 0.3s; }
.q-card.highlight { border-color:var(--green); }
.q-card-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px; }
.q-card-name { font-weight:600; font-size:15px; line-height:1.3; }
.q-card-badge { font-size:10px; padding:3px 8px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.badge-new { background:#E8F5E9; color:var(--green); }
.badge-pending { background:#FFF3CD; color:#856404; }
.badge-ok { background:#E8F5E9; color:var(--green); }
.q-card-info { font-size:12px; color:var(--slate-light); margin-bottom:4px; }
.q-card-zona { font-size:11px; padding:2px 8px; border-radius:20px; background:var(--foam); color:var(--amber-dark); display:inline-block; margin-bottom:8px; }
.q-card-controls { display:flex; gap:8px; align-items:center; margin-top:10px; }
.price-input { flex:1; padding:12px; border:2px solid var(--border-strong); border-radius:10px; font-size:18px; font-family:'Bebas Neue',sans-serif; text-align:center; outline:none; }
.price-input:focus { border-color:var(--amber); }
.save-btn { padding:12px 16px; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; white-space:nowrap; }
.save-btn:active { transform:scale(0.97); }
.action-row { display:flex; gap:6px; margin-top:10px; }
.action-btn { flex:1; padding:10px; border-radius:10px; border:none; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
.btn-approve { background:var(--green); color:#fff; }
.btn-reject { background:transparent; color:var(--red); border:1px solid var(--red); }
.btn-edit-name { background:transparent; color:var(--amber-dark); border:1px solid var(--amber-dark); }
.name-edit-input { width:100%; padding:10px; border:2px solid var(--amber); border-radius:10px; font-size:15px; font-family:'Inter',sans-serif; outline:none; margin-bottom:8px; }

.empty { text-align:center; padding:3rem 1rem; color:var(--slate-light); font-size:14px; }
.toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(80px); z-index:3000; background:var(--espresso); color:var(--foam); padding:14px 24px; border-radius:12px; font-size:14px; opacity:0; transition:all 0.3s; pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,0.25); }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.toast.success { border-left:3px solid var(--green); }
.toast.error { border-left:3px solid var(--red); }
</style>
</head>
<body>

<div class="login-wrap" id="login">
  <div class="login-card">
    <div class="login-logo">Quick <span>Admin</span> 🍺</div>
    <div class="login-sub">Actualiza precios desde el movil</div>
    <input type="password" id="pwd" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<div class="app" id="app">
  <div class="app-header">
    <div class="app-logo">Quick <span>Admin</span> 🍺</div>
    <a href="admin.html">Admin completo →</a>
  </div>

  <div class="stats-bar">
    <div class="stat-chip"><div class="stat-chip-num" id="stat-total">0</div><div class="stat-chip-label">Total</div></div>
    <div class="stat-chip"><div class="stat-chip-num" id="stat-comunidad">0</div><div class="stat-chip-label">Comunidad</div></div>
    <div class="stat-chip"><div class="stat-chip-num" id="stat-sinprecio">0</div><div class="stat-chip-label">Sin precio</div></div>
    <div class="stat-chip"><div class="stat-chip-num" id="stat-reportes">0</div><div class="stat-chip-label">Reportes</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('comunidad',this)">🆕 Comunidad</button>
    <button class="tab" onclick="switchTab('sinprecio',this)">💰 Sin precio</button>
    <button class="tab" onclick="switchTab('reportes',this)">💬 Reportes</button>
    <button class="tab" onclick="switchTab('todos',this)">📋 Todos</button>
  </div>

  <!-- TAB COMUNIDAD -->
  <div class="tab-panel active" id="tab-comunidad">
    <div class="search-section"><input type="text" class="search-box" id="search-comunidad" placeholder="🔍 Buscar..." oninput="renderComunidad()"></div>
    <div class="card-list" id="list-comunidad"></div>
  </div>

  <!-- TAB SIN PRECIO -->
  <div class="tab-panel" id="tab-sinprecio">
    <div class="search-section"><input type="text" class="search-box" id="search-sinprecio" placeholder="🔍 Buscar..." oninput="renderSinPrecio()"></div>
    <div class="sort-bar">
      <div class="sort-pill active" data-sort="nombre" onclick="setSortSP('nombre',this)">A-Z</div>
      <div class="sort-pill" data-sort="zona" onclick="setSortSP('zona',this)">Zona</div>
    </div>
    <div class="card-list" id="list-sinprecio"></div>
  </div>

  <!-- TAB REPORTES -->
  <div class="tab-panel" id="tab-reportes">
    <div class="card-list" id="list-reportes"></div>
  </div>

  <!-- TAB TODOS -->
  <div class="tab-panel" id="tab-todos">
    <div class="search-section"><input type="text" class="search-box" id="search-todos" placeholder="🔍 Buscar..." oninput="renderTodos()"></div>
    <div class="sort-bar">
      <div class="sort-pill active" data-sort="nombre" onclick="setSortAll('nombre',this)">A-Z</div>
      <div class="sort-pill" data-sort="zona" onclick="setSortAll('zona',this)">Zona</div>
      <div class="sort-pill" data-sort="precio" onclick="setSortAll('precio',this)">Precio</div>
    </div>
    <div class="card-list" id="list-todos"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var ADMIN_PASSWORD = 'Av0c4dOJ0S3';
var SUPABASE_URL = 'https://cldpkjdzikjzqrfbsghh.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsZHBramR6aWtqenFyZmJzZ2hoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzE0NzEsImV4cCI6MjA5NzQ0NzQ3MX0.-OFHTqGUan5e9thGp8B38eOeo5aJvwD99oDE7aW53Ws';

var allBars = [];
var reportes = [];
var sortSP = 'nombre';
var sortAll = 'nombre';

function extractZona(d) {
  if (!d) return 'Otros';
  d = d.toLowerCase();
  if (d.includes('centro') || d.includes('sol') || d.includes('gran via')) return 'Centro';
  if (d.includes('malasa') || d.includes('acuerdo') || d.includes('pez') || d.includes('san bernardo')) return 'Malasana';
  if (d.includes('lavapi') || d.includes('embajadores')) return 'Lavapies';
  if (d.includes('chueca') || d.includes('infantas') || d.includes('libertad')) return 'Chueca';
  if (d.includes('latina') || d.includes('cava baja')) return 'La Latina';
  if (d.includes('chamber') || d.includes('ponzano') || d.includes('luchana')) return 'Chamberi';
  if (d.includes('salamanca') || d.includes('serrano') || d.includes('goya')) return 'Salamanca';
  if (d.includes('retiro')) return 'Retiro';
  if (d.includes('arguelles') || d.includes('princesa')) return 'Arguelles';
  if (d.includes('tetuan') || d.includes('bravo murillo')) return 'Tetuan';
  if (d.includes('carabanchel')) return 'Carabanchel';
  if (d.includes('vallecas')) return 'Vallecas';
  if (d.includes('usera')) return 'Usera';
  if (d.includes('fuencarral') || d.includes('el pardo') || d.includes('montecarmelo') || d.includes('las tablas') || d.includes('mirasierra')) return 'Fuencarral';
  if (d.includes('san blas') || d.includes('canillejas')) return 'San Blas';
  if (d.includes('ciudad lineal') || d.includes('pueblo nuevo')) return 'Ciudad Lineal';
  if (d.includes('moncloa') || d.includes('aravaca')) return 'Moncloa';
  if (d.includes('barajas')) return 'Barajas';
  if (d.includes('hortaleza') || d.includes('arturo soria')) return 'Hortaleza';
  if (d.includes('villaverde')) return 'Villaverde';
  if (d.includes('moratalaz')) return 'Moratalaz';
  return 'Otros';
}

async function api(method, path, body) {
  var opts = { method:method, headers:{ 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY, 'Content-Type':'application/json', 'Prefer':method==='POST'?'return=representation':'' } };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.status === 204 ? null : r.json();
}

function doLogin() {
  if (document.getElementById('pwd').value === ADMIN_PASSWORD) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd').value = '';
  }
}

async function loadAll() {
  try { allBars = await api('GET', 'bares?select=*&order=nombre.asc'); } catch(e) { allBars = []; }
  try { reportes = await api('GET', 'reportes?select=*&revisado=eq.false&order=created_at.desc'); } catch(e) { reportes = []; }
  updateStats();
  renderComunidad();
  renderSinPrecio();
  renderReportes();
  renderTodos();
}

function updateStats() {
  var comunidad = allBars.filter(function(b) { return !b.aprobado; });
  var sinprecio = allBars.filter(function(b) { return b.aprobado && (!b.precio || parseFloat(b.precio) === 0); });
  document.getElementById('stat-total').textContent = allBars.length;
  document.getElementById('stat-comunidad').textContent = comunidad.length;
  document.getElementById('stat-sinprecio').textContent = sinprecio.length;
  document.getElementById('stat-reportes').textContent = reportes.length;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

/* ── COMUNIDAD (aprobado=false) ── */
function renderComunidad() {
  var q = (document.getElementById('search-comunidad').value || '').toLowerCase();
  var list = allBars.filter(function(b) {
    if (b.aprobado) return false;
    if (q && !(b.nombre||'').toLowerCase().includes(q) && !(b.direccion||'').toLowerCase().includes(q)) return false;
    return true;
  });
  var cont = document.getElementById('list-comunidad');
  if (!list.length) { cont.innerHTML = '<div class="empty">No hay bares por aprobar 🎉</div>'; return; }
  cont.innerHTML = list.map(function(b) {
    var zona = extractZona(b.direccion);
    var precio = parseFloat(b.precio) || 0;
    return '<div class="q-card" id="card-' + b.id + '">' +
      '<div class="q-card-header">' +
        '<div>' +
          '<div class="q-card-name" id="name-display-' + b.id + '">' + (b.nombre||'—') + '</div>' +
          '<div class="q-card-info">' + (b.direccion||'Sin direccion') + '</div>' +
          '<span class="q-card-zona">' + zona + '</span>' +
          (precio > 0 ? ' <span style="font-family:Bebas Neue;font-size:18px;color:var(--amber-dark)">' + precio.toFixed(2) + '€</span>' : '') +
        '</div>' +
        '<span class="q-card-badge" style="background:' + (b.fuente==='bot'?'#E3F2FD':b.fuente==='comunidad'?'#E8F5E9':b.fuente==='formulario'?'#FFF3E0':'#F5F5F5') + ';color:' + (b.fuente==='bot'?'#1565C0':b.fuente==='comunidad'?'#2E7D32':b.fuente==='formulario'?'#E65100':'#757575') + '">' + (b.fuente==='bot'?'🤖 Bot':b.fuente==='comunidad'?'👥 Comunidad':b.fuente==='formulario'?'📋 Formulario':'Nuevo') + '</span>' +
      '</div>' +
      '<div id="edit-name-' + b.id + '" style="display:none">' +
        '<input class="name-edit-input" id="name-input-' + b.id + '" value="' + (b.nombre||'').replace(/"/g,'&quot;') + '">' +
        '<div style="display:flex;gap:6px">' +
          '<button class="action-btn btn-approve" onclick="saveNameAndApprove(' + b.id + ')">Guardar y aprobar</button>' +
          '<button class="action-btn btn-reject" onclick="cancelEditName(' + b.id + ')">Cancelar</button>' +
        '</div>' +
      '</div>' +
      '<div class="q-card-controls" style="margin-bottom:8px">' +
        '<input class="price-input" type="number" id="cp-' + b.id + '" value="' + (precio>0?precio.toFixed(2):'') + '" placeholder="Precio €" step="0.10" min="0.50" max="15" inputmode="decimal">' +
      '</div>' +
      '<div class="action-row" id="actions-' + b.id + '">' +
        '<button class="action-btn btn-approve" onclick="aprobarConPrecio(' + b.id + ')">✅ Aprobar</button>' +
        '<button class="action-btn btn-edit-name" onclick="editName(' + b.id + ')">✏️ Editar</button>' +
        '<button class="action-btn btn-reject" onclick="rechazarBar(' + b.id + ',\'' + (b.nombre||'').replace(/'/g,'') + '\')">✕</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function editName(id) {
  document.getElementById('actions-' + id).style.display = 'none';
  document.getElementById('edit-name-' + id).style.display = 'block';
  document.getElementById('name-input-' + id).focus();
}

function cancelEditName(id) {
  document.getElementById('actions-' + id).style.display = 'flex';
  document.getElementById('edit-name-' + id).style.display = 'none';
}

async function saveNameAndApprove(id) {
  var nombre = document.getElementById('name-input-' + id).value.trim();
  if (!nombre) { showToast('El nombre no puede estar vacio', 'error'); return; }
  try {
    await api('PATCH', 'bares?id=eq.' + id, { nombre:nombre, aprobado:true });
    var bar = allBars.find(function(b) { return b.id === id; });
    if (bar) { bar.nombre = nombre; bar.aprobado = true; }
    updateStats(); renderComunidad(); renderTodos();
    showToast('✅ "' + nombre + '" aprobado', 'success');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function aprobarConPrecio(id) {
  var precioInput = document.getElementById('cp-' + id);
  var data = { aprobado:true };
  if (precioInput && precioInput.value && parseFloat(precioInput.value) >= 0.5) {
    data.precio = String(precioInput.value);
  }
  try {
    await api('PATCH', 'bares?id=eq.' + id, data);
    var bar = allBars.find(function(b) { return b.id === id; });
    if (bar) { bar.aprobado = true; if (data.precio) bar.precio = data.precio; }
    updateStats(); renderComunidad(); renderTodos();
    showToast('✅ Bar aprobado', 'success');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function aprobarBar(id) {
  try {
    await api('PATCH', 'bares?id=eq.' + id, { aprobado:true });
    var bar = allBars.find(function(b) { return b.id === id; });
    if (bar) bar.aprobado = true;
    updateStats(); renderComunidad(); renderTodos();
    showToast('✅ Bar aprobado', 'success');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function rechazarBar(id, nombre) {
  if (!confirm('¿Eliminar "' + nombre + '"?')) return;
  try {
    await api('DELETE', 'bares?id=eq.' + id);
    allBars = allBars.filter(function(b) { return b.id !== id; });
    updateStats(); renderComunidad(); renderTodos();
    showToast('Bar eliminado', 'success');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

/* ── SIN PRECIO ── */
function setSortSP(s, el) {
  sortSP = s;
  document.querySelectorAll('#tab-sinprecio .sort-pill').forEach(function(p) { p.classList.remove('active'); });
  el.classList.add('active');
  renderSinPrecio();
}

function renderSinPrecio() {
  var q = (document.getElementById('search-sinprecio').value || '').toLowerCase();
  var list = allBars.filter(function(b) {
    if (!b.aprobado) return false;
    if (b.precio && parseFloat(b.precio) > 0) return false;
    if (q && !(b.nombre||'').toLowerCase().includes(q) && !(b.direccion||'').toLowerCase().includes(q)) return false;
    return true;
  });
  if (sortSP === 'zona') list.sort(function(a,b) { return extractZona(a.direccion).localeCompare(extractZona(b.direccion)); });
  else list.sort(function(a,b) { return (a.nombre||'').localeCompare(b.nombre||''); });

  var cont = document.getElementById('list-sinprecio');
  if (!list.length) { cont.innerHTML = '<div class="empty">Todos los bares tienen precio 🎉</div>'; return; }
  cont.innerHTML = list.map(function(b) {
    var zona = extractZona(b.direccion);
    var searchQuery = encodeURIComponent(b.nombre + ' ' + (b.direccion||'Madrid') + ' precio cerveza');
    return '<div class="q-card">' +
      '<div class="q-card-header">' +
        '<div>' +
          '<div class="q-card-name">' + (b.nombre||'—') + '</div>' +
          '<div class="q-card-info">' + (b.direccion||'—') + '</div>' +
          '<span class="q-card-zona">' + zona + '</span>' +
        '</div>' +
        '<a href="https://www.google.com/search?q=' + searchQuery + '" target="_blank" style="font-size:12px;color:var(--amber-dark);text-decoration:none;white-space:nowrap">🔍 Buscar</a>' +
      '</div>' +
      '<div class="q-card-controls">' +
        '<input class="price-input" type="number" id="price-' + b.id + '" placeholder="€" step="0.10" min="0.50" max="15" inputmode="decimal" onkeydown="if(event.key===\'Enter\')savePrice(' + b.id + ')">' +
        '<button class="save-btn" onclick="savePrice(' + b.id + ')">Guardar</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function savePrice(id) {
  var input = document.getElementById('price-' + id);
  var precio = input.value;
  if (!precio || parseFloat(precio) < 0.5 || parseFloat(precio) > 15) { showToast('Precio invalido (0.50-15.00)', 'error'); return; }
  try {
    await api('PATCH', 'bares?id=eq.' + id, { precio:String(precio) });
    var bar = allBars.find(function(b) { return b.id === id; });
    if (bar) bar.precio = String(precio);
    updateStats(); renderSinPrecio(); renderTodos();
    showToast('✅ Precio guardado', 'success');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

/* ── REPORTES ── */
function renderReportes() {
  var cont = document.getElementById('list-reportes');
  if (!reportes.length) { cont.innerHTML = '<div class="empty">No hay reportes pendientes 🎉</div>'; return; }
  cont.innerHTML = reportes.map(function(r) {
    var fecha = r.created_at ? new Date(r.created_at).toLocaleDateString('es-ES', {day:'numeric',month:'short'}) : '';
    return '<div class="q-card">' +
      '<div class="q-card-header">' +
        '<div>' +
          '<div class="q-card-name">' + (r.bar_nombre||'—') + '</div>' +
          '<div class="q-card-info">Reportado ' + fecha + '</div>' +
        '</div>' +
        '<span style="font-family:Bebas Neue;font-size:22px;color:var(--amber-dark)">' + parseFloat(r.precio||0).toFixed(2) + '€</span>' +
      '</div>' +
      '<div class="action-row">' +
        '<button class="action-btn btn-approve" onclick="acceptReporte(' + r.id + ',' + r.bar_id + ',\'' + (r.precio||'').replace(/'/g,'') + '\')">✅ Aceptar precio</button>' +
        '<button class="action-btn btn-reject" onclick="rejectReporte(' + r.id + ')">✕ Rechazar</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function acceptReporte(reporteId, barId, precio) {
  try {
    await api('PATCH', 'bares?id=eq.' + barId, { precio:String(precio), aprobado:true });
    await api('PATCH', 'reportes?id=eq.' + reporteId, { revisado:true });
    var bar = allBars.find(function(b) { return b.id === barId; });
    if (bar) { bar.precio = String(precio); bar.aprobado = true; }
    reportes = reportes.filter(function(r) { return r.id !== reporteId; });
    updateStats(); renderReportes(); renderTodos();
    showToast('✅ Precio actualizado', 'success');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function rejectReporte(reporteId) {
  try {
    await api('PATCH', 'reportes?id=eq.' + reporteId, { revisado:true });
    reportes = reportes.filter(function(r) { return r.id !== reporteId; });
    updateStats(); renderReportes();
    showToast('Reporte descartado', 'success');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

/* ── TODOS ── */
function setSortAll(s, el) {
  sortAll = s;
  document.querySelectorAll('#tab-todos .sort-pill').forEach(function(p) { p.classList.remove('active'); });
  el.classList.add('active');
  renderTodos();
}

function renderTodos() {
  var q = (document.getElementById('search-todos').value || '').toLowerCase();
  var list = allBars.filter(function(b) {
    if (q && !(b.nombre||'').toLowerCase().includes(q) && !(b.direccion||'').toLowerCase().includes(q)) return false;
    return true;
  });
  if (sortAll === 'zona') list.sort(function(a,b) { return extractZona(a.direccion).localeCompare(extractZona(b.direccion)); });
  else if (sortAll === 'precio') list.sort(function(a,b) { return (parseFloat(a.precio)||999) - (parseFloat(b.precio)||999); });
  else list.sort(function(a,b) { return (a.nombre||'').localeCompare(b.nombre||''); });

  var cont = document.getElementById('list-todos');
  if (!list.length) { cont.innerHTML = '<div class="empty">No hay bares.</div>'; return; }
  cont.innerHTML = list.map(function(b) {
    var zona = extractZona(b.direccion);
    var precio = parseFloat(b.precio) || 0;
    var status = b.aprobado ? '<span class="q-card-badge badge-ok">✓</span>' : '<span class="q-card-badge badge-new">Nuevo</span>';
    return '<div class="q-card">' +
      '<div class="q-card-header">' +
        '<div>' +
          '<div class="q-card-name">' + (b.nombre||'—') + '</div>' +
          '<div class="q-card-info">' + (b.direccion||'—') + '</div>' +
          '<span class="q-card-zona">' + zona + '</span>' +
        '</div>' +
        '<div style="text-align:right">' +
          (precio > 0 ? '<div style="font-family:Bebas Neue;font-size:22px;color:var(--amber-dark)">' + precio.toFixed(2) + '€</div>' : '') +
          status +
        '</div>' +
      '</div>' +
      '<div class="q-card-controls">' +
        '<input class="price-input" type="number" id="pt-' + b.id + '" value="' + (precio>0?precio.toFixed(2):'') + '" placeholder="€" step="0.10" min="0.50" max="15" inputmode="decimal" onkeydown="if(event.key===\'Enter\')savePriceTodos(' + b.id + ')">' +
        '<button class="save-btn" onclick="savePriceTodos(' + b.id + ')">Guardar</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function savePriceTodos(id) {
  var input = document.getElementById('pt-' + id);
  var precio = input.value;
  if (!precio || parseFloat(precio) < 0.5 || parseFloat(precio) > 15) { showToast('Precio invalido', 'error'); return; }
  try {
    await api('PATCH', 'bares?id=eq.' + id, { precio:String(precio), aprobado:true });
    var bar = allBars.find(function(b) { return b.id === id; });
    if (bar) { bar.precio = String(precio); bar.aprobado = true; }
    updateStats(); renderSinPrecio(); renderTodos();
    showToast('✅ Precio guardado', 'success');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

function showToast(msg, type) {
  var tt = document.getElementById('toast');
  tt.textContent = msg; tt.className = 'toast show ' + (type||'');
  setTimeout(function() { tt.classList.remove('show'); }, 2500);
}
</script>
</body>
